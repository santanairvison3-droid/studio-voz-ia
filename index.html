<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Voz IA — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161d2d;
  --surface2: #1c2438;
  --border: rgba(0,212,200,0.15);
  --accent: #00d4c8;
  --accent2: #00b4aa;
  --glow: rgba(0,212,200,0.25);
  --text: #eeeef8;
  --muted: #4a5568;
  --success: #00d68f;
  --error: #ff3d71;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Fira Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,200,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,200,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Radial glow center */
body::after {
  content: '';
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(0,212,200,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* Waveform at bottom */
.waveform {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 100px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 3px;
  padding: 0 10px;
  opacity: 0.35;
  z-index: 1;
}
.bar {
  flex: 1;
  max-width: 5px;
  background: linear-gradient(to top, var(--accent), rgba(0,212,200,0.3), transparent);
  border-radius: 2px 2px 0 0;
  animation: wave var(--dur) ease-in-out infinite alternate;
  animation-delay: var(--delay);
}
@keyframes wave {
  from { height: 4px; }
  to   { height: var(--h); }
}

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 44px 40px;
  width: 100%;
  max-width: 430px;
  position: relative;
  z-index: 10;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03),
    0 0 80px rgba(0,212,200,0.07),
    0 40px 80px rgba(0,0,0,0.6);
  animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Top accent line */
.card::before {
  content: '';
  position: absolute;
  top: -1px; left: 20%; right: 20%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  border-radius: 99px;
}

.logo {
  text-align: center;
  margin-bottom: 36px;
}
.logo-icon {
  width: 62px; height: 62px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 14px;
  box-shadow: 0 0 40px var(--glow), 0 8px 20px rgba(0,0,0,0.4);
  animation: pulseGlow 3s ease-in-out infinite;
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 40px var(--glow), 0 8px 20px rgba(0,0,0,0.4); }
  50%       { box-shadow: 0 0 60px rgba(0,212,200,0.5), 0 8px 20px rgba(0,0,0,0.4); }
}
.logo h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 4px;
  line-height: 1;
  background: linear-gradient(135deg, #fff 40%, rgba(255,200,200,0.7));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo p {
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 6px;
  font-weight: 500;
}

.form-group { margin-bottom: 20px; }

label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

input[type=text], input[type=password] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  padding: 14px 16px;
  color: var(--text);
  font-family: 'Fira Sans', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}
input[type=text]:focus, input[type=password]:focus {
  border-color: rgba(0,212,200,0.5);
  box-shadow: 0 0 0 3px rgba(0,212,200,0.12);
}
input::placeholder { color: var(--muted); }

.btn-primary {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  border: none;
  border-radius: 10px;
  color: #0d1117;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 3px;
  cursor: pointer;
  margin-top: 6px;
  transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
  box-shadow: 0 4px 24px var(--glow);
  position: relative;
  overflow: hidden;
}
.btn-primary::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transform: skewX(-20deg);
  transition: left 0.4s;
}
.btn-primary:hover::after { left: 150%; }
.btn-primary:hover { box-shadow: 0 6px 36px rgba(0,212,200,0.45); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary:disabled::after { display: none; }

.msg {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 13px;
  text-align: center;
  display: none;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.msg.error   { background: rgba(255,61,113,0.1); border: 1px solid rgba(255,61,113,0.25); color: #ff7096; display: block; }
.msg.success { background: rgba(0,214,143,0.1);  border: 1px solid rgba(0,214,143,0.25);  color: #2dffb4; display: block; }
.msg.info    { background: rgba(100,100,200,0.1); border: 1px solid rgba(100,100,200,0.25); color: #9999dd; display: block; }

.version {
  text-align: center;
  margin-top: 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
}
.version span { color: var(--accent); }
</style>
</head>
<body>

<div class="waveform" id="waveform"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🎙️</div>
    <h1>Studio Voz IA</h1>
    <p>Irvison Dark Studio</p>
  </div>

  <div class="form-group">
    <label for="username">Usuário</label>
    <input type="text" id="username" placeholder="seu_usuario" autocomplete="username" />
  </div>

  <div class="form-group">
    <label for="password">Senha</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
  </div>

  <button class="btn-primary" id="btn-login" onclick="doLogin()">ENTRAR</button>
  <div class="msg" id="msg"></div>

  <div class="version">Studio Voz IA <span>v1.0</span> · Dark Studio</div>
</div>

<script>
const API = 'https://studio-voz-ia-irvison-s-projects.vercel.app';

/* ── Waveform bars ── */
const wf = document.getElementById('waveform');
for (let i = 0; i < 100; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  const h = (Math.random() * 75 + 15).toFixed(0);
  const dur = (Math.random() * 0.8 + 0.6).toFixed(2);
  const delay = (Math.random() * 0.6).toFixed(2);
  b.style.cssText = `--h:${h}px;--dur:${dur}s;--delay:${delay}s`;
  wf.appendChild(b);
}

/* ── Utilities ── */
async function sha256(msg) {
  const buf = new TextEncoder().encode(msg);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function parseJWT(token) {
  try {
    return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
  } catch { return null; }
}

function showMsg(text, type = 'error') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

/* ── Auto-redirect if already logged in ── */
const saved = localStorage.getItem('svia_token');
if (saved) {
  const u = parseJWT(saved);
  if (u) {
    window.location.href = u.role === 'admin' ? 'admin.html' : 'dashboard.html';
  }
}

/* ── Enter key ── */
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

/* ── Login ── */
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');

  if (!username || !password) {
    showMsg('Preencha usuário e senha.'); return;
  }

  btn.disabled = true;
  btn.textContent = 'ENTRANDO...';

  try {
    const pw = await sha256(password);

    const res = await fetch(`${API}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, pw })
    });

    const data = await res.json();

    if (!res.ok) {
      showMsg(data.error || 'Credenciais inválidas.'); return;
    }

    localStorage.setItem('svia_token', data.token);

    const user = parseJWT(data.token);
    showMsg('Acesso liberado! Redirecionando...', 'success');

    setTimeout(() => {
      window.location.href = user?.role === 'admin' ? 'admin.html' : 'dashboard.html';
    }, 900);

  } catch (err) {
    showMsg('Erro de conexão. Verifique sua internet.');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'ENTRAR';
  }
}
</script>
</body>
</html>
